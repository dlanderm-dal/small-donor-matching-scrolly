<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 510" width="600" height="510">
  <title>Scene 4 — Tier 1 + Tier 2 + Tier 3 bar chart</title>
  <line x1="50" y1="0" x2="50" y2="410" stroke="#707070" stroke-width="4"/>
