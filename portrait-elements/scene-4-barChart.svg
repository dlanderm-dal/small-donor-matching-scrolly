  <text x="232" y="295" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="25" fill="#464546">$250</text>
  <text x="357" y="345" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="25" fill="#464546">$100</text>
  <text x="232" y="478" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="22" fill="#434343">Donation</text>
