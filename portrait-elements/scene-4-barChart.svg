  <!-- Three tier columns -->
  <rect x="50" y="10" width="114" height="400" fill="rgba(118,0,255,0.15)" stroke="#7600ff" stroke-width="3"/>
  <rect x="175" y="160" width="114" height="250" fill="rgba(118,0,255,0.15)" stroke="#7600ff" stroke-width="3"/>
  <rect x="300" y="260" width="114" height="150" fill="rgba(0,39,255,0.15)" stroke="#0027ff" stroke-width="3"/>
