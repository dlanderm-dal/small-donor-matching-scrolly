  <text x="232" y="142" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="25" fill="#434343">Tier 2</text>
  <text x="357" y="242" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="25" fill="#434343">Tier 3</text>
