<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <title>Scene 3 — Tier 1 + Tier 2 bar chart</title>
  <line x1="50" y1="0" x2="50" y2="410" stroke="#707070" stroke-width="4"/>
  <line x1="50" y1="410" x2="480" y2="410" stroke="#707070" stroke-width="4"/>
  <!-- Tier 1 (purple, full height) -->
  <rect x="50" y="10" width="114" height="400" fill="rgba(118,0,255,0.15)" stroke="#7600ff" stroke-width="3"/>
  <text x="107" y="-8" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="25" fill="#434343">Tier 1</text>
  <text x="107" y="215" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="25" fill="#464546">$400</text>
  <!-- Tier 2 (blue, half height) -->
  <rect x="175" y="210" width="114" height="200" fill="rgba(0,39,255,0.15)" stroke="#0027ff" stroke-width="3"/>
  <text x="232" y="192" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="30" font-weight="700" fill="#434343">x4</text>
  <text x="232" y="320" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="25" fill="#464546">$200</text>
  <!-- Green donor strips -->
  <rect x="50" y="410" width="114" height="50" fill="rgba(34,149,0,0.15)" stroke="#229500" stroke-width="3"/>
  <rect x="175" y="410" width="114" height="50" fill="rgba(34,149,0,0.15)" stroke="#229500" stroke-width="3"/>
  <text x="180" y="478" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="22" fill="#434343">Donation</text>
</svg>
