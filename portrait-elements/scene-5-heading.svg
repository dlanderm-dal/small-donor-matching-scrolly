<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 460" width="1160" height="460">
  <title>Scene 5 — heading</title>
  <text font-family="'Source Serif 4', Georgia, serif" fill="#1a1a1a" font-size="56" font-weight="400">
    <tspan x="0" y="64">The county stops matching when</tspan>
    <tspan x="0" y="132">a donor has given more than $150</tspan>
    <tspan x="0" y="200">to a candidate over the course of</tspan>
    <tspan x="0" y="268">an election, and candidates are</tspan>
    <tspan x="0" y="336">prohibited from accepting more</tspan>
    <tspan x="0" y="404">than $500 from any single donor.</tspan>
  </text>
</svg>
