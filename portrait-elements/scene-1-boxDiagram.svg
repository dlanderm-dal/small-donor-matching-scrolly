<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 953 320" width="953" height="320">
  <title>Scene 1 — $50 + $350 = $400 box diagram</title>
  <!-- Donation label -->
  <text x="86" y="30" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="35" fill="#434343">Donation</text>
  <!-- $50 green box -->
  <rect x="0" y="90" width="171" height="136" rx="27" fill="#fff" stroke="#229500" stroke-linejoin="round" stroke-width="15"/>
  <text x="86" y="178" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="50" fill="#464546">$50</text>
  <!-- + symbol -->
  <text x="290" y="187" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="110" font-weight="700" fill="#a0a0a0" stroke="#000" stroke-width="3">+</text>
  <!-- $350 blue box + label -->
  <text x="493" y="30" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="35" fill="#434343">Match</text>
  <rect x="407" y="90" width="171" height="136" rx="27" fill="#fff" stroke="#0027ff" stroke-linejoin="round" stroke-width="15"/>
  <text x="493" y="178" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="50" fill="#464546">$350</text>
  <!-- = symbol -->
  <text x="681" y="187" text-anchor="middle" font-family="'Helvetica Neue', sans-serif" font-size="110" font-weight="700" fill="#a0a0a0" stroke="#000" stroke-width="3">=</text>
  <!-- $400 purple box + label -->
  <text x="868" y="30" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="35" fill="#434343">Candidate receives</text>
  <rect x="782" y="80" width="171" height="136" rx="27" fill="#fff" stroke="#7600ff" stroke-linejoin="round" stroke-width="15"/>
  <text x="868" y="168" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="50" fill="#464546">$400</text>
</svg>
