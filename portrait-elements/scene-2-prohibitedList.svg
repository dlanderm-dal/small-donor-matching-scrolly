<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 460" width="1160" height="460">
  <title>Scene 2 — prohibited donors list</title>
  <!-- Left red rule -->
  <rect x="0" y="0" width="6" height="460" fill="#d92b2b"/>
  <!-- List items: red × markers + serif text -->
  <g font-family="'Source Serif 4', Georgia, serif" fill="#1a1a1a" font-size="38">
    <text x="38" y="50" font-size="46" fill="#d92b2b" font-weight="700">×</text>
    <text x="100" y="48">Political Action Committees (PACs)</text>
    <text x="38" y="130" font-size="46" fill="#d92b2b" font-weight="700">×</text>
    <text x="100" y="128">Corporations</text>
    <text x="38" y="210" font-size="46" fill="#d92b2b" font-weight="700">×</text>
    <text x="100" y="208">Labor Unions</text>
    <text x="38" y="290" font-size="46" fill="#d92b2b" font-weight="700">×</text>
    <text x="100" y="288">LLCs</text>
    <text x="38" y="370" font-size="46" fill="#d92b2b" font-weight="700">×</text>
    <text x="100" y="368">State or local central committees</text>
    <text x="100" y="416">of a political party</text>
  </g>
</svg>
