<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 380" width="1160" height="380">
  <title>Scene 3 — heading</title>
  <text font-family="'Source Serif 4', Georgia, serif" fill="#1a1a1a" font-size="56" font-weight="400">
    <tspan x="0" y="64">The state board keeps a running</tspan>
    <tspan x="0" y="132">total of each donor's contributions,</tspan>
    <tspan x="0" y="200">and as a donor gives more to a</tspan>
    <tspan x="0" y="268">candidate over the course of an</tspan>
    <tspan x="0" y="336">election, the amount drops.</tspan>
  </text>
</svg>
