<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" width="360" height="480">
  <title>Scene 1 — vertical bar chart (single tier)</title>
  <!-- Y-axis -->
  <line x1="50" y1="0" x2="50" y2="410" stroke="#707070" stroke-width="4"/>
  <!-- X-axis -->
  <line x1="50" y1="410" x2="360" y2="410" stroke="#707070" stroke-width="4"/>
  <!-- Tier 1 blue match column -->
  <rect x="50" y="0" width="114" height="350" fill="rgba(0,39,255,0.15)" stroke="#0027ff" stroke-width="3"/>
  <!-- Green donor strip -->
  <rect x="50" y="350" width="114" height="50" fill="rgba(34,149,0,0.15)" stroke="#229500" stroke-width="3"/>
  <!-- Multiplier label -->
  <text x="107" y="-8" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="25" fill="#434343">x7</text>
  <!-- $350 inside blue column -->
  <text x="107" y="180" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="25" fill="#464546">$350</text>
  <!-- $50 inside green strip -->
  <text x="107" y="385" text-anchor="middle" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="25" fill="#464546">$50</text>
  <!-- Donation axis label -->
  <text x="180" y="450" text-anchor="middle" font-family="'Source Serif 4', Georgia, serif" font-size="22" fill="#434343">Donation</text>
</svg>
